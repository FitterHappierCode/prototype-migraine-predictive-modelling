services:
  - type: web
    name: prototype-migraine-ml-service
    runtime: python
    rootDir: ml_service
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 10000

  - type: web
    name: prototype-migraine-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false
      - key: ML_SERVICE_URL
        sync: false
